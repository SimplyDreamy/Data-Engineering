name: Hourly Weather Sync

on:
  schedule:
    # This is "Cron" syntax. '0 * * * *' means "Run at minute 0 of every hour"
    - cron: '0 * * * *'
  workflow_dispatch: # This allows you to also run it manually with a button

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Run weather script
        run: python weather.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "weather-bot"
          git config --global user.email "actions@github.com"
          git add weather.csv
          git commit -m "Automated weather update" || exit 0
          git push