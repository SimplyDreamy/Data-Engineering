name: Hourly Weather Sync

on:
  schedule:
    # Run at minute 0 of every hour
    - cron: '0 * * * *'
  workflow_dispatch: # run manually with a button

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest #faster than windows

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Check my location
        run: |
          pwd
          ls -R

      - name: Run weather script
        working-directory: "Day 1"
        run: python main.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "Day 1/weather.csv"
          git commit -m "Automated weather update" || exit 0 # OR incase it errors
          git push origin main:data